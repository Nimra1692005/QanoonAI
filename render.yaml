services:
  - type: web
    name: qanoonai-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: GROQ_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: https://qanoonai.vercel.app,https://your-app.vercel.app
